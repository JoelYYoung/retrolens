name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          uv run ruff check src/

      - name: Run tests
        run: |
          uv run python -m pytest tests/ -v --tb=short

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build wheel
        run: uv build --wheel

      - name: Verify wheel contents
        run: |
          python -c "
          import zipfile, sys, glob
          whl = glob.glob('dist/*.whl')[0]
          with zipfile.ZipFile(whl) as z:
              names = z.namelist()
              # Check essential files exist
              assert any('cli.py' in n for n in names), 'Missing cli.py'
              assert any('readers/' in n for n in names), 'Missing readers/'
              assert any('py.typed' in n for n in names), 'Missing py.typed'
              assert any('entry_points.txt' in n for n in names), 'Missing entry_points'
              print(f'✅ Wheel OK: {len(names)} files')
              for n in sorted(names):
                  print(f'  {n}')
          "

      - name: Test wheel install
        run: |
          uv venv /tmp/test-env
          VIRTUAL_ENV=/tmp/test-env uv pip install dist/*.whl
          /tmp/test-env/bin/retrolens --version
          /tmp/test-env/bin/retrolens --help
