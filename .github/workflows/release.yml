name: Release

on:
  push:
    tags:
      - 'v*.*.*'  # Triggered on version tags like v0.5.1

permissions:
  contents: write
  id-token: write  # For trusted publishing to PyPI

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build wheel and sdist
        run: uv build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  test-install:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Test wheel install
        run: |
          uv venv /tmp/test-install
          VIRTUAL_ENV=/tmp/test-install uv pip install dist/*.whl
          /tmp/test-install/bin/retrolens --version
          /tmp/test-install/bin/retrolens cfg show
          /tmp/test-install/bin/retrolens --help

  publish-pypi:
    runs-on: ubuntu-latest
    needs: test-install
    environment: release
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Trusted publishing - no token needed if configured in PyPI
        # Alternative: use `password: ${{ secrets.PYPI_API_TOKEN }}`

  create-release:
    runs-on: ubuntu-latest
    needs: test-install
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create skill package
        run: |
          # Create Claude Skill Hub package
          mkdir -p skill-package
          cp -r retrolens-plugin/* skill-package/
          cd skill-package
          zip -r ../retrolens-skill-${{ github.ref_name }}.zip .
          cd ..
          
          # Verify package contents
          echo "=== Skill package contents ==="
          unzip -l retrolens-skill-${{ github.ref_name }}.zip

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ github.ref_name }}"
          if [ -f CHANGELOG.md ]; then
            # Extract section for this version
            sed -n "/## \[${VERSION#v}\]/,/## \[/p" CHANGELOG.md | sed '$d' > release-notes.md
          else
            echo "Release $VERSION" > release-notes.md
            echo "" >> release-notes.md
            echo "See commit history for details." >> release-notes.md
          fi
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*
            retrolens-skill-${{ github.ref_name }}.zip
          body_path: release-notes.md
          draft: false
          prerelease: false
